{% extends 'base.html' %}
{% block title %}Company Registration{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4">
                    <i class="bi bi-building text-warning"></i> Company Registration
                </h3>
                <form method="POST" action="{{ url_for('auth.register_company') }}">
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="Enter company name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required placeholder="Enter company email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="Min 6 characters">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">HR Contact Name</label>
                        <input type="text" name="hr_contact" class="form-control" placeholder="Enter HR contact name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Industry</label>
                        <input type="text" name="industry" class="form-control" placeholder="e.g. IT, Finance, Healthcare">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="url" name="website" class="form-control" placeholder="https://yourcompany.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Brief description of your company"></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Register</button>
                </form>
                <div class="text-center mt-3">
                    <small>Already registered? <a href="{{ url_for('auth.login') }}">Login here</a></small>
                </div>
                <div class="alert alert-info mt-3 mb-0" role="alert">
                    <i class="bi bi-info-circle"></i> Your account will be reviewed by admin before you can login.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
