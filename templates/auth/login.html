{% extends 'base.html' %}
{% block title %}Login — Placement Portal{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <h3 class="text-center mb-4">
                    <i class="bi bi-mortarboard-fill text-primary"></i> Login
                </h3>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label">Login As</label>
                        <select name="role" class="form-select" required>
                            <option value="">-- Select Role --</option>
                            <option value="admin">Master</option>
                            <option value="company">Enterprise</option>
                            <option value="student">Learner</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email / Username</label>
                        <input type="text" name="email" class="form-control" required placeholder="Enter email or username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr>
                <div class="text-center">
                    <small>New Learner? <a href="{{ url_for('auth.register_student') }}">Begin Your Journey</a></small><br>
                    <small>New Enterprise? <a href="{{ url_for('auth.register_company') }}">Hire Top Talent</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
